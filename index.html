<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bubble Addition</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5B2A86">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bubble Addition">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#5B2A86;
    --sky-mid:#9147C4;
    --sky-bot:#FFB4A2;
    --card:#ffffff;
    --ink:#3A2159;
    --pop-red:#FF6B6B;
    --pop-teal:#2FC9C0;
    --pop-yellow:#FFC93D;
    --pop-purple:#A78BFA;
    --pop-green:#6BCB77;
    --pop-orange:#FF9245;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    margin:0;height:100%;overflow:hidden;
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bot) 100%);
    touch-action:none;
  }
  #sky{position:absolute;inset:0;overflow:hidden;z-index:0;}
  .star2{
    position:absolute;background:#fff;border-radius:50%;
    box-shadow:0 0 6px 1px rgba(255,255,255,.8);
  }
  .moon{
    position:absolute;top:6%;right:8%;width:110px;height:110px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFF9E8, #FFE9A0 60%, #FFDD7A);
    box-shadow:0 0 60px 20px rgba(255,221,122,.45);
    z-index:0;
  }
  #hill{
    position:absolute;left:-10%;right:-10%;bottom:-6%;height:22%;
    background:#7A4FA0;border-radius:50% 50% 0 0 / 100% 100% 0 0;
    z-index:0;
  }

  #topbar{
    position:relative;z-index:5;
    display:flex;flex-direction:column;align-items:center;
    padding:14px 12px 6px;
  }
  h1{
    margin:0;
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:clamp(28px,6vw,44px);
    color:#fff;
    text-shadow:0 3px 0 #6a2fa0, 0 6px 14px rgba(0,0,0,.25);
    letter-spacing:1px;
    line-height:1;
  }
  #subtitle{
    margin:2px 0 10px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:clamp(13px,2.6vw,18px);
    color:#FFE9A0;
    text-shadow:0 2px 0 rgba(0,0,0,.2);
    letter-spacing:3px;
    text-transform:uppercase;
  }
  #wordHint{
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:clamp(16px,3.6vw,22px);
    color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.15);
    margin-bottom:8px;
    letter-spacing:2px;
  }
  #wordCard{
    background:var(--card);
    border-radius:26px;
    padding:14px 22px;
    box-shadow:0 10px 0 rgba(0,0,0,.12), 0 16px 30px rgba(0,0,0,.18);
    display:flex;
    gap:10px;
  }
  .slot{
    width:clamp(38px,8vw,58px);
    height:clamp(46px,9.5vw,68px);
    border-radius:14px;
    border-bottom:6px solid #e2d6f2;
    background:#f4eefc;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:clamp(22px,5vw,34px);
    color:var(--ink);
    transition:transform .25s cubic-bezier(.34,1.56,.64,1), background .2s;
  }
  .slot.hint{color:#c9b8e3;background:#f0e9f9;}
  .slot.filled{
    background:linear-gradient(180deg,#fff,#f7f0ff);
    border-bottom-color:#d9c2ff;
    transform:scale(1.12);
    animation:slotPop .4s ease;
  }
  @keyframes slotPop{
    0%{transform:scale(.6) rotate(-8deg);}
    60%{transform:scale(1.25) rotate(4deg);}
    100%{transform:scale(1.12) rotate(0);}
  }

  #hud{
    position:absolute;top:16px;left:16px;z-index:6;
    background:rgba(255,255,255,.9);
    border-radius:16px;
    padding:8px 14px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    color:var(--ink);
    font-size:15px;
    box-shadow:0 6px 0 rgba(0,0,0,.1);
    display:flex;align-items:center;gap:8px;
  }
  #hud span.star{color:#FFC93D;font-size:18px;}
  #hud span.sep{color:#d9cbe9;margin:0 2px;}
  #hud span.clock{color:#A78BFA;font-size:16px;}

  #resetBtn{
    position:absolute;top:16px;right:16px;z-index:6;
    font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;
    background:var(--pop-red);color:#fff;border:none;
    padding:10px 16px;border-radius:16px;
    box-shadow:0 6px 0 #c94848;
    cursor:pointer;
  }
  #resetBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #c94848;}

  #newWordBtn{
    position:absolute;top:16px;right:150px;z-index:6;
    font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;
    background:var(--pop-teal);color:#fff;border:none;
    padding:10px 16px;border-radius:16px;
    box-shadow:0 6px 0 #1e9c94;
    cursor:pointer;
  }
  #newWordBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #1e9c94;}

  #startStopRow{
    position:absolute;top:60px;right:16px;z-index:6;
    display:flex;gap:8px;
  }
  .runBtn{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;
    color:#fff;border:none;
    padding:10px 18px;border-radius:16px;
    cursor:pointer;
  }
  #startBtn2{background:var(--pop-green);box-shadow:0 6px 0 #4a9c53;}
  #startBtn2:active{transform:translateY(4px);box-shadow:0 2px 0 #4a9c53;}
  #stopBtn{background:#6b7280;box-shadow:0 6px 0 #454b52;}
  #stopBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #454b52;}
  .runBtn:disabled{opacity:.45;cursor:default;}
  .runBtn:disabled:active{transform:none;}

  #pausedOverlay{
    position:absolute;inset:0;z-index:40;
    pointer-events:none;
    background:rgba(40,20,60,.5);
    display:none;
    align-items:center;justify-content:center;
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(28px,7vw,48px);
    color:#fff;
    text-shadow:0 3px 0 rgba(0,0,0,.3);
  }

  #playArea{
    position:absolute;inset:0;z-index:2;
  }

  .letterBubble{
    position:absolute;
    width:var(--sz);height:var(--sz);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transform-style:preserve-3d;
    will-change:transform;
    filter:drop-shadow(0 10px 8px rgba(0,0,0,.28));
  }
  .letterBubble .face{
    position:absolute;inset:0;
    border-radius:26%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',cursive;
    font-weight:800;
    color:#fff;
    text-shadow:0 2px 3px rgba(0,0,0,.25);
    backface-visibility:hidden;
  }
  .letterBubble .front{
    background:linear-gradient(145deg, var(--c1), var(--c2));
    box-shadow:inset 0 6px 10px rgba(255,255,255,.45), inset 0 -10px 14px rgba(0,0,0,.18);
  }
  .letterBubble .back{
    background:linear-gradient(145deg, var(--c2), var(--c1));
    transform:rotateY(180deg) translateZ(1px);
  }
  .letterBubble.wrong{animation:shakeNo .45s ease;}
  @keyframes shakeNo{
    0%,100%{filter:drop-shadow(0 10px 8px rgba(0,0,0,.28));}
    20%{transform:translateX(-10px) rotate(-6deg);}
    40%{transform:translateX(10px) rotate(6deg);}
    60%{transform:translateX(-6px) rotate(-3deg);}
    80%{transform:translateX(6px) rotate(3deg);}
  }
  .letterBubble.flying{
    transition:top .55s cubic-bezier(.2,.8,.3,1.4), left .55s cubic-bezier(.2,.8,.3,1.4), transform .55s ease, opacity .3s ease .3s;
    z-index:20;
  }
  .letterBubble.gone{opacity:0;pointer-events:none;}

  #banner{
    position:absolute;top:40%;left:50%;
    transform:translate(-50%,-50%) scale(.6);
    z-index:30;
    font-family:'Baloo 2',cursive;
    font-weight:800;
    font-size:clamp(30px,7vw,56px);
    color:#fff;
    text-shadow:0 4px 0 #6a2fa0, 0 8px 20px rgba(0,0,0,.3);
    opacity:0;
    pointer-events:none;
    white-space:nowrap;
  }
  #banner.show{
    animation:bannerPop 1.4s cubic-bezier(.2,.9,.25,1.4) forwards;
  }
  @keyframes bannerPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg);}
    15%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(3deg);}
    25%{transform:translate(-50%,-50%) scale(1) rotate(0);}
    80%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-60%) scale(1.05);}
  }

  .confetti{
    position:absolute;top:-20px;
    width:10px;height:16px;
    border-radius:3px;
    z-index:25;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(115vh) rotate(540deg);opacity:.9;}
  }

  #startOverlay{
    position:absolute;inset:0;z-index:50;
    background:linear-gradient(180deg,var(--sky-top),var(--sky-mid) 60%,var(--sky-bot));
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;
    text-align:center;
    padding:20px;
  }
  #startOverlay h1{font-size:clamp(32px,9vw,56px);}
  #startOverlay #subtitle{font-size:clamp(14px,3vw,20px);}
  #startOverlay p{
    font-family:'Nunito',sans-serif;font-weight:800;color:#fff;
    font-size:clamp(14px,3.4vw,18px);max-width:420px;margin:0;
    text-shadow:0 2px 0 rgba(0,0,0,.15);
  }
  #startBtn{
    font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(18px,4vw,24px);
    background:var(--pop-orange);color:#fff;border:none;
    padding:16px 40px;border-radius:24px;
    box-shadow:0 8px 0 #c65f1e;
    cursor:pointer;
  }
  #startBtn:active{transform:translateY(6px);box-shadow:0 2px 0 #c65f1e;}
</style>
</head>
<body>

<div id="sky">
  <div class="moon"></div>
  <div id="hill"></div>
</div>

<div id="hud"><span class="star">&#9733;</span><span id="scoreVal">0</span> solved<span class="sep">|</span><span class="clock">&#9200;</span><span id="timerVal">00:00</span></div>
<button id="resetBtn" onclick="resetGame()">Reset &#8635;</button>
<button id="newWordBtn" onclick="skipWord()">New sum &#8635;</button>
<div id="startStopRow">
  <button id="startBtn2" class="runBtn" onclick="resumeGame()">&#9654; Start</button>
  <button id="stopBtn" class="runBtn" onclick="stopGame()">&#9724; Stop</button>
</div>
<div id="pausedOverlay">Paused</div>

<div id="topbar">
  <h1>Bubble Addition</h1>
  <div id="subtitle">Ages 3 to 12</div>
  <div id="wordHint"></div>
  <div id="wordCard"></div>
</div>

<div id="playArea"></div>
<div id="banner"></div>

<div id="startOverlay">
  <h1 style="color:#fff;font-family:'Baloo 2',cursive;font-weight:800;text-shadow:0 3px 0 #6a2fa0,0 6px 14px rgba(0,0,0,.25);">Bubble Addition</h1>
  <div id="subtitle" style="position:static;">Ages 3 to 12</div>
  <p>Pop the floating number bubbles in the right order to answer each sum. Tap or click each bubble!</p>
  <div id="ageRow" style="display:flex;align-items:center;gap:10px;">
    <label for="ageInput" style="font-family:'Baloo 2',cursive;font-weight:800;color:#fff;font-size:clamp(14px,3.4vw,18px);text-shadow:0 2px 0 rgba(0,0,0,.15);">How old are you?</label>
    <input id="ageInput" type="number" min="3" max="12" value="6" style="width:70px;padding:10px;border-radius:14px;border:none;font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;text-align:center;color:var(--ink);">
  </div>
  <button id="startBtn" onclick="startGame()">Let's Play!</button>
</div>

<script>
const COLORS = [
  ["#FF8A80","#FF5252"],
  ["#64FFDA","#1DE9B6"],
  ["#FFD180","#FFAB40"],
  ["#B39DDB","#7E57C2"],
  ["#A5D6A7","#4CAF50"],
  ["#81D4FA","#29B6F6"],
  ["#FFF59D","#FDD835"],
  ["#F48FB1","#EC407A"]
];

let currentWord = "";   // string of digits = the answer
let currentPrompt = ""; // e.g. "4 + 3"
let progress = 0;
let score = 0;
let bubbles = [];
let audioCtx = null;
let elapsedSeconds = 0;
let timerInterval = null;
let isRunning = false;
let playerAge = 6;

function beep(freq, dur, type, vol){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type||'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol||0.15;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function playCorrect(){ beep(660,0.12,'triangle',0.18); setTimeout(()=>beep(880,0.15,'triangle',0.18),90); }
function playWrong(){ beep(180,0.18,'sawtooth',0.12); }
function playWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'triangle',0.2), i*110));
}

function startGame(){
  const ageVal = parseInt(document.getElementById('ageInput').value, 10);
  playerAge = isNaN(ageVal) ? 6 : Math.max(3, Math.min(12, ageVal));
  document.getElementById('startOverlay').style.display='none';
  if(audioCtx===null){ try{audioCtx = new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  isRunning = false;
  updateRunButtons();
  nextWord();
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    elapsedSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay(){
  const m = Math.floor(elapsedSeconds/60).toString().padStart(2,'0');
  const s = (elapsedSeconds%60).toString().padStart(2,'0');
  document.getElementById('timerVal').textContent = m+':'+s;
}

function stopGame(){
  if(!isRunning) return;
  isRunning = false;
  if(timerInterval) clearInterval(timerInterval);
  document.getElementById('pausedOverlay').style.display='flex';
  updateRunButtons();
}

function resumeGame(){
  if(isRunning) return;
  if(document.getElementById('startOverlay').style.display !== 'none') return;
  isRunning = true;
  document.getElementById('pausedOverlay').style.display='none';
  startTimer();
  updateRunButtons();
}

function updateRunButtons(){
  document.getElementById('startBtn2').disabled = isRunning;
  document.getElementById('stopBtn').disabled = !isRunning;
}

function resetGame(){
  score = 0;
  elapsedSeconds = 0;
  document.getElementById('scoreVal').textContent = score;
  updateTimerDisplay();
  isRunning = true;
  document.getElementById('pausedOverlay').style.display='none';
  updateRunButtons();
  startTimer();
  skipWord();
}

/*
  Difficulty tiers below are based on U.S. Common Core State Standards
  for Mathematics (CCSS-M), which map roughly to these ages:

  Ages 3-4 (Pre-K, no formal CCSS addition standard yet):
    Informal number sense only. Kept very small (1-5) as a gentle intro.

  Ages 5-6 (Kindergarten):
    CCSS.MATH.CONTENT.K.OA.A.5 - Fluently add and subtract within 5.
    CCSS.MATH.CONTENT.K.OA.A.2 - Solve addition/subtraction word problems,
      and add/subtract within 10.
    -> operands capped at 5 (sums up to 10).

  Ages 6-7 (Grade 1):
    CCSS.MATH.CONTENT.1.OA.C.6 - Add and subtract within 20, demonstrating
      fluency for addition and subtraction within 10.
    -> operands capped at 10 (sums up to 20).

  Ages 7-8 (Grade 2):
    CCSS.MATH.CONTENT.2.OA.B.2 - Fluently add and subtract within 20
      (know from memory all sums of two one-digit numbers).
    CCSS.MATH.CONTENT.2.NBT.B.5 - Fluently add and subtract within 100.
    -> operands capped at 20 (sums up to ~40, within the 100 range).

  Ages 9-10 (Grade 3):
    Builds fluency toward CCSS.MATH.CONTENT.3.NBT.A.2 - Fluently add and
      subtract within 1000.
    -> operands capped at 50 (sums within 100).

  Ages 11-12 (Grade 4+):
    CCSS.MATH.CONTENT.4.NBT.B.4 - Fluently add and subtract multi-digit
      whole numbers using the standard algorithm.
    -> operands capped at 99 (two-digit + two-digit).

  Source: Common Core State Standards Initiative, thecorestandards.org/Math
*/
function getMaxOperand(){
  if(playerAge <= 4) return 5;
  if(playerAge <= 6) return 5;
  if(playerAge <= 7) return 10;
  if(playerAge <= 8) return 20;
  if(playerAge <= 10) return 50;
  return 99;
}

function makeProblem(){
  const max = getMaxOperand();
  const a = Math.floor(Math.random()*max)+1;
  const b = Math.floor(Math.random()*max)+1;
  const answer = a+b;
  return { prompt: a+' + '+b+' =', answer: String(answer) };
}

function pickWord(){
  return makeProblem();
}

function nextWord(){
  const p = pickWord();
  currentWord = p.answer;
  currentPrompt = p.prompt;
  progress = 0;
  renderWordCard();
  spawnBubbles();
}

function skipWord(){
  clearBubbles();
  nextWord();
}

function renderWordCard(){
  document.getElementById('wordHint').textContent = currentPrompt + ' ?';
  const card = document.getElementById('wordCard');
  card.innerHTML = '';
  for(let i=0;i<currentWord.length;i++){
    const slot = document.createElement('div');
    slot.className = 'slot' + (i<progress ? ' filled':' hint');
    slot.id = 'slot-'+i;
    slot.textContent = i<progress ? currentWord[i] : '';
    card.appendChild(slot);
  }
}

function clearBubbles(){
  const area = document.getElementById('playArea');
  area.innerHTML = '';
  bubbles = [];
}

function spawnBubbles(){
  clearBubbles();
  const needed = currentWord.split('');
  const digits = '0123456789';
  const distractorCount = Math.min(6, Math.max(4, 10 - needed.length));
  let pool = needed.slice();
  while(pool.length < needed.length + distractorCount){
    const r = digits[Math.floor(Math.random()*digits.length)];
    if(!needed.includes(r) || Math.random()<0.3) pool.push(r);
  }
  pool.sort(()=>Math.random()-0.5);

  const area = document.getElementById('playArea');
  const areaRect = area.getBoundingClientRect();
  const topSafe = 190, bottomSafe = 40;

  pool.forEach((ch)=>{
    const size = Math.min(90, Math.max(58, areaRect.width/9));
    const el = document.createElement('div');
    el.className = 'letterBubble';
    el.style.setProperty('--sz', size+'px');
    const col = COLORS[Math.floor(Math.random()*COLORS.length)];
    el.style.setProperty('--c1', col[0]);
    el.style.setProperty('--c2', col[1]);
    el.innerHTML = '<div class="face front">'+ch+'</div><div class="face back">'+ch+'</div>';

    const x = Math.random()*(areaRect.width - size);
    const y = topSafe + Math.random()*(areaRect.height - topSafe - bottomSafe - size);
    el.style.left = x+'px';
    el.style.top = y+'px';

    const state = {
      el, ch,
      x, y,
      vx: (Math.random()-0.5)*0.6,
      vy: (Math.random()-0.5)*0.6,
      rot: Math.random()*360,
      rotSpeed: (Math.random()-0.5)*1.2,
      bob: Math.random()*Math.PI*2,
      size,
      alive:true
    };
    el.addEventListener('pointerdown', (e)=>{ e.preventDefault(); handlePick(state); });
    area.appendChild(el);
    bubbles.push(state);
  });
}

function handlePick(state){
  if(!state.alive || !isRunning) return;
  const needed = currentWord[progress];
  if(state.ch === needed){
    state.alive = false;
    playCorrect();
    const slot = document.getElementById('slot-'+progress);
    const slotRect = slot.getBoundingClientRect();
    const areaRect = document.getElementById('playArea').getBoundingClientRect();
    state.el.classList.add('flying');
    state.el.style.left = (slotRect.left - areaRect.left + slotRect.width/2 - state.size/2) + 'px';
    state.el.style.top = (slotRect.top - areaRect.top + slotRect.height/2 - state.size/2) + 'px';
    state.el.style.transform = 'scale(0.5) rotate(360deg)';
    setTimeout(()=>{ state.el.classList.add('gone'); }, 480);
    setTimeout(()=>{ if(state.el.parentNode) state.el.parentNode.removeChild(state.el); }, 900);

    progress++;
    slot.classList.remove('hint');
    slot.classList.add('filled');

    if(progress >= currentWord.length){
      score++;
      document.getElementById('scoreVal').textContent = score;
      playWin();
      showBanner(pickPraise());
      launchConfetti();
      setTimeout(()=>{ nextWord(); }, 1400);
    }
  } else {
    playWrong();
    state.el.classList.remove('wrong');
    void state.el.offsetWidth;
    state.el.classList.add('wrong');
  }
}

const PRAISE = ["Great job!","Awesome!","You got it!","Super solver!","Nice work!","Fantastic!"];
function pickPraise(){ return PRAISE[Math.floor(Math.random()*PRAISE.length)]; }

function showBanner(text){
  const b = document.getElementById('banner');
  b.textContent = text;
  b.classList.remove('show');
  void b.offsetWidth;
  b.classList.add('show');
}

function launchConfetti(){
  const colors = ['#FF6B6B','#2FC9C0','#FFC93D','#A78BFA','#6BCB77','#FF9245'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (1.6+Math.random()*1.2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>{ if(c.parentNode) c.parentNode.removeChild(c); }, 3200);
  }
}

function animate(){
  if(!isRunning){ requestAnimationFrame(animate); return; }
  const area = document.getElementById('playArea');
  const rect = area.getBoundingClientRect();
  const topSafe = 190, bottomSafe = 40;
  bubbles.forEach(s=>{
    if(!s.alive) return;
    s.bob += 0.02;
    s.x += s.vx;
    s.y += s.vy + Math.sin(s.bob)*0.15;
    s.rot += s.rotSpeed;
    if(s.x < 0 || s.x > rect.width - s.size) s.vx *= -1;
    if(s.y < topSafe || s.y > rect.height - bottomSafe - s.size) s.vy *= -1;
    s.x = Math.max(0, Math.min(rect.width - s.size, s.x));
    s.y = Math.max(topSafe, Math.min(rect.height - bottomSafe - s.size, s.y));
    if(!s.el.classList.contains('flying')){
      s.el.style.left = s.x+'px';
      s.el.style.top = s.y+'px';
      s.el.style.transform = 'rotateY('+s.rot+'deg) rotateX('+(Math.sin(s.bob)*12)+'deg)';
    }
  });
  requestAnimationFrame(animate);
}

function makeStars(){
  const sky = document.getElementById('sky');
  for(let i=0;i<60;i++){
    const st = document.createElement('div');
    st.className='star2';
    const sz = 1+Math.random()*2.5;
    st.style.width=sz+'px'; st.style.height=sz+'px';
    st.style.top = (Math.random()*70)+'%';
    st.style.left = (Math.random()*100)+'%';
    st.style.opacity = 0.4+Math.random()*0.6;
    sky.appendChild(st);
  }
}

makeStars();
animate();
updateRunButtons();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
